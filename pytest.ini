[pytest]
addopts = -s -v
python_files = *_tests.py test_*.py
python_classes = Test*
python_functions = test_*
markers =
    api: Маркировка для API автотестов
    smoke: Маркировка дял smoke-тестов
    slow: Маркировка для медленных тестов
    fast: Маркировка для быстрых тестов
    critical: Маркировка для критичных тестов
    regression: Маркировка для регрессионных тестов
    users: Маркировка для тестов, связанных с пользователями
    files: Маркировка для тестов, связанных с файлами
    courses: Маркировка для тестов, связанных с курсами
    authentication: Маркировка для тестов, связанных с аутентификацией пользователей
